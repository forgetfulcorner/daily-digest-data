name: Generate Daily Digest
on:
  repository_dispatch:
    types: [new_log] # This matches the 'event_type' in your iPhone Shortcut
  workflow_dispatch: # Add this line!

jobs:
  think:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: gives the bot permission to save the JSON file
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-genai

      - name: Run Gemini Brain
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/process_question.py "${{ github.event.client_payload.question }}"

      - name: Save and Commit Changes
        run: |
          git config --global user.name "DigestBot"
          git config --global user.email "actions@github.com"
          git add data/
          git diff-index --quiet HEAD || git commit -m "New entry from iPhone"
          git push
