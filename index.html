<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intrusive Thoughts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* This makes the AI's long answers look beautiful and readable */
        .prose p { margin-bottom: 1.25rem; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.25rem; }
        .prose h3 { font-size: 1.1rem; font-weight: 800; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #1e293b; }
        .card-gradient { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); }
        .tab-active { background: #2563eb; color: white; border-color: #2563eb; }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen pb-24">

    <nav class="p-6 bg-white/90 backdrop-blur-md border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <!-- Replaced H1 with the Image Logo -->
            <a href="/" class="block">
                <img src="Later.png" alt="Later Logo" class="h-10 w-auto object-contain">
            </a>
            
            <div class="flex gap-1 bg-slate-100 p-1 rounded-xl border">
                <button id="tab-day" onclick="switchTab('day')" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all tab-active">Daily</button>
                <button id="tab-cat" onclick="switchTab('cat')" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500">Topics</button>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4 pt-8" id="app-content">
        <div class="flex justify-center py-20 text-slate-300 animate-pulse">Initializing archive...</div>
    </main>

    <div id="daily-nav" class="fixed bottom-8 left-1/2 -translate-x-1/2 flex gap-4 bg-white/90 backdrop-blur-md shadow-2xl border p-2 rounded-3xl z-50">
        <button onclick="changeDate(-1)" class="p-4 hover:bg-white rounded-2xl transition border border-transparent hover:border-slate-200">
            <i data-lucide="chevron-left"></i>
        </button>
        <button onclick="viewToday()" class="px-8 py-4 font-black text-xs uppercase tracking-widest bg-blue-600 text-white rounded-2xl shadow-lg hover:bg-blue-700 transition">
            Today
        </button>
        <button onclick="changeDate(1)" class="p-4 hover:bg-white rounded-2xl transition border border-transparent hover:border-slate-200">
            <i data-lucide="chevron-right"></i>
        </button>
    </div>

    <script>
        const USER = "forgetfulcorner";
        const REPO = "daily-digest-data";
        let currentTab = 'day';
        let viewDate = new Date();
        let selectedCategory = "All Topics";

        let touchStart = 0;
        let touchEnd = 0;
        
        // Listen for the start of a touch
        window.addEventListener('touchstart', e => {
            touchStart = e.targetTouches[0].pageY;
        }, {passive: true});
        
        // Listen for the movement
        window.addEventListener('touchmove', e => {
            touchEnd = e.targetTouches[0].pageY;
            
            // If we are at the top of the page and swipe down more than 150px
            if (window.scrollY === 0 && touchEnd - touchStart > 150) {
                // Trigger a visual hint (optional) or just reload
                location.reload(); 
            }
        }, {passive: true});

        const CATEGORIES = [
            "All Topics", "General Knowledge", "Geography & Places", "Government & Politics", 
            "Current Events & News", "Science", "Technology", "History", 
            "Culture & Entertainment", "Math & Calculations", "Data & Statistics"
        ];

        // Core UI Controller
        async function loadView() {
            const dailyNav = document.getElementById('daily-nav');
            if (currentTab === 'day') {
                dailyNav.style.display = 'flex';
                renderDayView();
            } else {
                dailyNav.style.display = 'none';
                renderTopicView();
            }
        }

        // --- DAILY VIEW LOGIC ---
        async function renderDayView() {
            const container = document.getElementById('app-content');
            const y = viewDate.getFullYear();
            const m = String(viewDate.getMonth() + 1).padStart(2, '0');
            const d = String(viewDate.getDate()).padStart(2, '0');
            
            const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/data/${y}/${m}/${d}.json?t=${Date.now()}`;
            const header = `<div class="mb-8 text-center"><p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-1">Journal Entry</p><p class="text-xl font-bold text-slate-800">${m}/${d}/${y}</p></div>`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error();
                const data = await res.json();
                container.innerHTML = header + data.reverse().map(item => cardTemplate(item)).join('');
            } catch {
                container.innerHTML = header + `
                    <div class="text-center py-20 border-2 border-dashed rounded-[3rem] border-slate-200 bg-white/50">
                        <i data-lucide="calendar-x" class="mx-auto w-10 h-10 text-slate-200 mb-4"></i>
                        <p class="text-slate-400 font-bold italic">No entries logged for this date.</p>
                    </div>`;
            }
            lucide.createIcons();
        }

        // --- TOPIC VIEW LOGIC (Lifetime Archive) ---
        async function renderTopicView() {
            const container = document.getElementById('app-content');
            
            let dropdownHtml = `
                <div class="mb-10 group">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Filter Lifetime History</label>
                    <div class="relative">
                        <select onchange="updateFilter(this.value)" class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-800 shadow-sm outline-none appearance-none cursor-pointer focus:border-blue-500 transition-colors">
                            ${CATEGORIES.map(c => `<option value="${c}" ${selectedCategory === c ? 'selected' : ''}>${c}</option>`).join('')}
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                            <i data-lucide="chevron-down" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>`;

            container.innerHTML = dropdownHtml + `<div class="text-center py-10 text-slate-400 animate-pulse">Opening master vault...</div>`;

            // Fetches the master file we created in the Python script
            const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/data/all_posts.json?t=${Date.now()}`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error();
                const allPosts = await res.json();

                const filtered = selectedCategory === "All Topics" 
                    ? allPosts 
                    : allPosts.filter(p => p.category === selectedCategory);

                if (filtered.length === 0) {
                    container.innerHTML = dropdownHtml + `<div class="text-center py-20 text-slate-400 italic">No posts found under "${selectedCategory}".</div>`;
                } else {
                    // Show newest posts first
                    container.innerHTML = dropdownHtml + filtered.reverse().map(item => cardTemplate(item)).join('');
                }
            } catch {
                container.innerHTML = dropdownHtml + `<div class="text-center py-20 text-slate-400 italic">Master archive (all_posts.json) not found.<br>Log a new post to initialize the archive!</div>`;
            }
            lucide.createIcons();
        }

        // --- UTILS ---
        function cardTemplate(item) {
            // This converts the AI's markdown into clean HTML
            const formattedAnswer = marked.parse(item.answer);
            
            return `
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 mb-8 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em]">${item.category}</span>
                        <span class="text-[9px] font-bold text-slate-300 uppercase">${item.timestamp ? new Date(item.timestamp).toLocaleDateString() : ''}</span>
                    </div>
                    <h2 class="text-xl font-bold text-slate-900 mb-4 leading-tight">${item.clean_question}</h2>
                    <div class="text-slate-600 text-sm leading-relaxed prose prose-slate max-w-none">
                        ${formattedAnswer}
                    </div>
                </div>`;
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tab-day').className = t === 'day' ? 'px-4 py-1.5 text-xs font-bold rounded-lg transition-all tab-active' : 'px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500';
            document.getElementById('tab-cat').className = t === 'cat' ? 'px-4 py-1.5 text-xs font-bold rounded-lg transition-all tab-active' : 'px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500';
            loadView();
        }

        function updateFilter(val) { selectedCategory = val; renderTopicView(); }
        function changeDate(n) { viewDate.setDate(viewDate.getDate() + n); renderDayView(); }
        function viewToday() { viewDate = new Date(); renderDayView(); }

        loadView();
    </script>
</body>
</html>
