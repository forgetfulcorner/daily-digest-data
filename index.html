<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intrusive Thoughts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .card-gradient { background: linear-gradient(135deg, #ffffff 0%, #fefeff 100%); }
        .tab-active { background: #2563eb; color: white; border-color: #2563eb; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen pb-24">

    <nav class="p-6 bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-600 tracking-tighter italic uppercase">forgetfulcorner.</h1>
            <div class="flex gap-1 bg-slate-100 p-1 rounded-xl border">
                <button id="tab-day" onclick="switchTab('day')" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all tab-active">Daily</button>
                <button id="tab-cat" onclick="switchTab('cat')" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500">Topics</button>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4 pt-8" id="app-content"></main>

    <div id="daily-nav" class="fixed bottom-8 left-1/2 -translate-x-1/2 flex gap-4 bg-white/90 backdrop-blur-md shadow-2xl border p-2 rounded-3xl z-50">
        <button onclick="changeDate(-1)" class="p-4 hover:bg-white rounded-2xl transition border border-transparent hover:border-slate-200"><i data-lucide="chevron-left"></i></button>
        <button onclick="viewToday()" class="px-8 py-4 font-black text-xs uppercase tracking-widest bg-blue-600 text-white rounded-2xl shadow-lg">Today</button>
        <button onclick="changeDate(1)" class="p-4 hover:bg-white rounded-2xl transition border border-transparent hover:border-slate-200"><i data-lucide="chevron-right"></i></button>
    </div>

    <script>
        const USER = "forgetfulcorner";
        const REPO = "daily-digest-data";
        let currentTab = 'day';
        let viewDate = new Date();
        let selectedCategory = "All Topics";

        const PREDEFINED_CATEGORIES = [
            "All Topics", "General Knowledge", "Geography & Places", "Government & Politics", 
            "Current Events & News", "Science", "Technology", "History", 
            "Culture & Entertainment", "Math & Calculations", "Data & Statistics"
        ];

        async function loadData() {
            const container = document.getElementById('app-content');
            const dailyNav = document.getElementById('daily-nav');
            
            if (currentTab === 'day') {
                dailyNav.style.display = 'flex';
                renderDayView();
            } else {
                dailyNav.style.display = 'none';
                renderCategoryView();
            }
        }

        async function renderDayView() {
            const container = document.getElementById('app-content');
            const y = viewDate.getFullYear();
            const m = String(viewDate.getMonth() + 1).padStart(2, '0');
            const d = String(viewDate.getDate()).padStart(2, '0');
            
            const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/data/${y}/${m}/${d}.json?t=${Date.now()}`;

            let header = `<div class="mb-8 text-center"><p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-1">Archived On</p><p class="text-xl font-bold text-slate-800">${m}/${d}/${y}</p></div>`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error();
                const data = await res.json();
                container.innerHTML = header + data.reverse().map(item => cardTemplate(item)).join('');
            } catch {
                container.innerHTML = header + `<div class="text-center py-20 border-2 border-dashed rounded-[3rem] border-slate-200 bg-white/50"><p class="text-slate-400 font-bold italic">No logs for this date.</p></div>`;
            }
            lucide.createIcons();
        }

        async function renderCategoryView() {
            const container = document.getElementById('app-content');
            
            // 1. Create Dropdown UI
            let catHeader = `
                <div class="mb-10">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Filter by Topic</label>
                    <select onchange="updateCategoryFilter(this.value)" class="w-full p-4 bg-white border rounded-2xl font-bold text-slate-800 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none appearance-none cursor-pointer">
                        ${PREDEFINED_CATEGORIES.map(c => `<option value="${c}" ${selectedCategory === c ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                </div>`;

            container.innerHTML = catHeader + `<div class="text-center py-10 animate-pulse text-slate-400">Searching all history...</div>`;

            // 2. Scan last 14 days (Gemma's limits allow for wide scans)
            let allEntries = [];
            for(let i=0; i<14; i++) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const path = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
                try {
                    const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/data/${path}.json`);
                    if(res.ok) allEntries = allEntries.concat(await res.json());
                } catch(e) {}
            }

            // 3. Filter and Render
            const filtered = selectedCategory === "All Topics" 
                ? allEntries 
                : allEntries.filter(e => e.category === selectedCategory);

            if (filtered.length === 0) {
                container.innerHTML = catHeader + `<div class="text-center py-20 text-slate-400 italic">No entries found for "${selectedCategory}" in the last 2 weeks.</div>`;
            } else {
                container.innerHTML = catHeader + filtered.map(item => cardTemplate(item)).join('');
            }
            lucide.createIcons();
        }

        function cardTemplate(item) {
            return `
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 mb-8 shadow-sm">
                    <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-4 block">${item.category}</span>
                    <h2 class="text-xl font-bold text-slate-900 mb-4 leading-tight">${item.clean_question}</h2>
                    <div class="text-slate-600 text-sm leading-relaxed space-y-4">${item.answer}</div>
                </div>`;
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tab-day').className = t === 'day' ? 'px-4 py-1.5 text-xs font-bold rounded-lg tab-active' : 'px-4 py-1.5 text-xs font-bold rounded-lg text-slate-500';
            document.getElementById('tab-cat').className = t === 'cat' ? 'px-4 py-1.5 text-xs font-bold rounded-lg tab-active' : 'px-4 py-1.5 text-xs font-bold rounded-lg text-slate-500';
            loadData();
        }

        function updateCategoryFilter(val) { selectedCategory = val; renderCategoryView(); }
        function changeDate(n) { viewDate.setDate(viewDate.getDate() + n); renderDayView(); }
        function viewToday() { viewDate = new Date(); renderDayView(); }

        loadData();
    </script>
</body>
</html>
